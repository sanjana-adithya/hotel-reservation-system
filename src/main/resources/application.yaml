spring:
  application:
    name: hotel
  datasource:
    url: jdbc:postgresql://localhost:5454/hoteldb
    driver-class-name: org.postgresql.Driver
    username: admin
    password: admin
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update

security:
  oauth2:
    resourceserver:
      jwt:
        issuer-uri: http://localhost:9001/realms/hotel-booking
