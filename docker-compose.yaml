services:
  postgres:
    image: postgres:17-alpine
    container_name: hotel-booking-database

    environment:
      POSTGRES_DB: hoteldb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin

    ports:
      - "5454:5432"

    volumes:
      - hotel-postgres-data:/var/lib/postgresql/data

  keycloak:
    image: docker.io/keycloak/keycloak:25.0.0
    container_name: hotel-keycloak
    command: start-dev --import-realm --health-enabled=true
    ports:
      - "9001:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

volumes:
  hotel-postgres-data: